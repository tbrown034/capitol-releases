name: Weekly pipeline

on:
  schedule:
    # 17:00 UTC Sunday = 1:00 PM ET. Run after Sunday's daily so deletions
    # operate on a fresh corpus.
    - cron: "0 17 * * 0"
    # 14:00 UTC Monday = 10:00 AM ET. Health canary after the Monday update.
    - cron: "0 14 * * 1"
  workflow_dispatch:

concurrency:
  group: pipeline-weekly
  cancel-in-progress: false

jobs:
  deletions:
    if: github.event.schedule == '0 17 * * 0' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt
      - run: pip install -r pipeline/requirements.txt
      - run: python -m pipeline deletions

  health:
    if: github.event.schedule == '0 14 * * 1' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt
      - run: pip install -r pipeline/requirements.txt
      - run: python -m pipeline health
