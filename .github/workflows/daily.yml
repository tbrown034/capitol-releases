name: Daily pipeline

on:
  schedule:
    # 4x/day at 9 AM, 1 PM, 5 PM, 9 PM ET (UTC: 13, 17, 21, 01). Same-day
    # business-hour content gets captured within ~4h instead of waiting
    # until the next morning. Source-URL dedup makes re-runs safe.
    - cron: "0 1,13,17,21 * * *"
  workflow_dispatch:

concurrency:
  group: pipeline-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run daily update
        # Loads every chamber from pipeline/seeds/*.json via load_members().
        # That includes senate.json (US), executive.json, and tx_senate.json
        # (Texas state senate, 30 districts). Adding a new chamber is just
        # dropping a new seed file and registering it in pipeline/lib/seeds.py.
        run: python -m pipeline update

      - name: Refresh op-ed silos (WP custom post type)
        run: python -m pipeline.scripts.backfill_op_eds

      - name: Refresh WP extras (newsletters, speeches, blogs, remarks)
        run: python -m pipeline.scripts.backfill_wp_extras

      - name: Refresh HTML silos (commentary, columns, op-eds, blogs on
          dedicated listing URLs not covered by /press-releases/)
        run: python -m pipeline.scripts.backfill_silos --max-pages 3

      - name: Run data-quality tests
        run: python -m pipeline test

      - name: Generate data-health report
        # Runs after collection + tests so the report reflects today's run.
        # docs/ is gitignored so the file lands in the runner workspace
        # only; for now this serves as in-CI diagnostics + a future
        # commit-target if we decide to surface it on the site.
        run: python -m pipeline health-report
