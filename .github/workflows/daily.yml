name: Daily pipeline

on:
  schedule:
    # 13:00 UTC daily = 9:00 AM ET (8:00 AM during DST). Press releases from
    # the prior day have landed; the morning news cycle hasn't started.
    - cron: "0 13 * * *"
  workflow_dispatch:

concurrency:
  group: pipeline-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run daily update
        run: python -m pipeline update

      - name: Refresh op-ed silos (WP custom post type)
        run: python -m pipeline.scripts.backfill_op_eds

      - name: Refresh WP extras (newsletters, speeches, blogs, remarks)
        run: python -m pipeline.scripts.backfill_wp_extras

      - name: Run data-quality tests
        run: python -m pipeline test
